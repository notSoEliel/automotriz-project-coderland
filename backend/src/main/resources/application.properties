spring.application.name=api
# Configuración de Servidor
server.port=8080

# Conexión a Base de Datos (Docker Network)
spring.datasource.url=jdbc:postgresql://db:5432/automotriz_db
spring.datasource.username=user_admin
spring.datasource.password=secret_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Limite de subida de archivos
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Inicialización de Datos (Seed)
# data.sql se desactiva en entornos persistentes; usamos un seeder que solo corre si la BD está vacía
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true
